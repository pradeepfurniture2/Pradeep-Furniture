<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Pradeep Furniture</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="toast.css">
    <script src="toast.js"></script>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <!-- 🔝 NAVBAR (Same as site) -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="logo">
        </a>
        <div class="nav-right">
            <button id="theme-toggle" class="theme-btn" title="Toggle Light/Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="reset-page">
        <div class="reset-card">
            <div class="reset-header">
                <i class="fa-solid fa-key" style="font-size: 40px; color: #c49963; margin-bottom: 20px;"></i>
                <h1>Reset Password</h1>
                <p>Enter your email address and we'll send you a secure link to reset your password.</p>
            </div>

            <div class="input-box">
                <input type="email" id="reset-email" placeholder=" " required>
                <label>Enter Email Address</label>
            </div>

            <button class="btn" id="send-link-btn" onclick="handleForgotPassword()">
                Send Reset Link <i class="fa-solid fa-paper-plane" style="margin-left: 8px;"></i>
            </button>

            <div class="back-to-login">
                <a href="login.html"><i class="fa-solid fa-circle-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="auth.js"></script>
    <script src="theme.js"></script>
    <script>
        async function handleForgotPassword() {
            const email = document.getElementById("reset-email").value.trim();
            const btn = document.getElementById("send-link-btn");
            const originalText = btn.innerHTML;

            if (!email) {
                window.showToast("Please enter your email! ✉️", "error");
                return;
            }

            try {
                btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Sending...`;
                btn.disabled = true;

                // Call the globally defined function from auth.js
                const success = await window.forgotPassword(email);
                
                if (success) {
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> Link Sent!`;
                    btn.style.background = "#2e7d32";
                    setTimeout(() => { window.location.href = "login.html"; }, 3000);
                } else {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

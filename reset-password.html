<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Pradeep Furniture</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="forgot-password.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="toast.css">
    <script src="toast.js"></script>
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <!-- 🔝 NAVBAR -->
    <header class="navbar">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="logo">
        </a>
    </header>

    <div class="reset-page">
        <div class="reset-card" id="reset-form-container">
            <div class="reset-header">
                <i class="fa-solid fa-lock-open" style="font-size: 40px; color: #c49963; margin-bottom: 20px;"></i>
                <h1>Set New Password</h1>
                <p>Ensure your new password is at least 8 characters long and includes numbers or symbols.</p>
            </div>

            <div class="input-box password-box">
                <input type="password" id="new-password" placeholder=" " required>
                <label>New Password</label>
                <i class="fa-solid fa-eye-slash" onclick="togglePass('new-password', this)"></i>
            </div>

            <div class="input-box password-box">
                <input type="password" id="confirm-password" placeholder=" " required>
                <label>Confirm New Password</label>
                <i class="fa-solid fa-eye-slash" onclick="togglePass('confirm-password', this)"></i>
            </div>

            <button class="btn" id="reset-btn" onclick="handleResetPassword()">
                Update Password <i class="fa-solid fa-cloud-arrow-up" style="margin-left: 8px;"></i>
            </button>
        </div>

        <!-- Success Message (Initially Hidden) -->
        <div class="reset-card" id="success-message" style="display: none;">
            <div class="reset-header">
                <i class="fa-solid fa-circle-check" style="font-size: 50px; color: #2e7d32; margin-bottom: 20px;"></i>
                <h1>All Done!</h1>
                <p>Your password has been successfully updated. You can now log in with your new credentials.</p>
            </div>
            <a href="login.html" class="btn">Back to Login</a>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="auth.js"></script>
    <script src="theme.js"></script>
    <script>
        function togglePass(id, icon) {
            const el = document.getElementById(id);
            if (el.type === "password") {
                el.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            } else {
                el.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            }
        }

        async function handleResetPassword() {
            const newPass = document.getElementById("new-password").value;
            const confirmPass = document.getElementById("confirm-password").value;
            const btn = document.getElementById("reset-btn");

            if (newPass.length < 8) {
                window.showToast("Password must be at least 8 characters! 🔒", "error");
                return;
            }

            if (newPass !== confirmPass) {
                window.showToast("Passwords do not match! ❌", "error");
                return;
            }

            // Capture the 'oobCode' from URL
            const urlParams = new URLSearchParams(window.location.search);
            const oobCode = urlParams.get('oobCode');

            if (!oobCode) {
                window.showToast("Invalid or expired reset link! 🚫", "error");
                return;
            }

            try {
                btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Updating...`;
                btn.disabled = true;

                // Call the globally defined function from auth.js
                const success = await window.confirmPasswordReset(oobCode, newPass);
                
                if (success) {
                    document.getElementById("reset-form-container").style.display = "none";
                    document.getElementById("success-message").style.display = "block";
                } else {
                    btn.innerHTML = `Update Password <i class="fa-solid fa-cloud-arrow-up" style="margin-left: 8px;"></i>`;
                    btn.disabled = false;
                }
            } catch (error) {
                btn.innerHTML = `Update Password <i class="fa-solid fa-cloud-arrow-up" style="margin-left: 8px;"></i>`;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

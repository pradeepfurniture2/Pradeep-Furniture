<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Coupons | Admin | Pradeep Furniture</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="toast.css">
    <script src="toast.js"></script>
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-color);
        }

        .admin-sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-brand {
            padding: 25px 30px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
        }

        .sidebar-brand img { width: 45px; }

        .admin-sidebar .nav-item {
            padding: 10px 18px;
            margin: 0 15px 5px 15px;
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .admin-sidebar .nav-item:hover,
        .admin-sidebar .nav-item.active {
            background: var(--accent-light);
            color: var(--accent-color);
            transform: translateX(5px);
        }

        .admin-main {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
        }

        /* Coupon Center Styles */
        .coupon-action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
        }

        .add-coupon-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .add-coupon-btn:hover { background: #a67c52; transform: translateY(-2px); }

        .coupons-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .coupon-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px dashed var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .coupon-card:hover { transform: translateY(-5px); box-shadow: var(--card-shadow); }

        .coupon-card::before {
            content: "";
            position: absolute;
            left: -15px; top: 50%; width: 30px; height: 30px;
            background: var(--bg-color);
            border-radius: 50%;
            transform: translateY(-50%);
            border: 1px solid var(--border-color);
        }
        .coupon-card::after {
            content: "";
            position: absolute;
            right: -15px; top: 50%; width: 30px; height: 30px;
            background: var(--bg-color);
            border-radius: 50%;
            transform: translateY(-50%);
            border: 1px solid var(--border-color);
        }

        .coupon-info h3 { font-size: 24px; color: var(--accent-color); letter-spacing: 2px; margin-bottom: 5px; }
        .coupon-info p { color: var(--text-muted); font-size: 13px; }
        .coupon-value { text-align: right; }
        .coupon-value h2 { font-size: 28px; color: var(--text-primary); }
        .coupon-value .expiry { font-size: 11px; text-transform: uppercase; color: #d32f2f; font-weight: 700; margin-top: 5px; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .btn-row { display: flex; gap: 15px; margin-top: 25px; }
        .btn-save { flex: 1; background: var(--accent-color); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-cancel { flex: 1; background: var(--hover-bg); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; cursor: pointer; color: var(--text-primary); }

        .delete-btn {
            color: #d32f2f;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
            margin-left: 15px;
        }
        .delete-btn:hover { transform: scale(1.2); }

        /* ================= RESPONSIVE ================= */
        @media (max-width: 991px) {
            .admin-sidebar {
                left: -260px;
                transition: all 0.4s ease;
            }
            .admin-sidebar.active {
                left: 0;
            }
            .admin-main {
                margin-left: 0 !important;
                padding: 100px 15px 40px !important;
            }
            .navbar {
                left: 0 !important;
                width: 100% !important;
            }
            .menu-toggle-admin {
                display: block !important;
                font-size: 20px;
                cursor: pointer;
                color: var(--text-primary);
                margin-right: 15px;
            }
            .coupon-action-bar {
                flex-direction: column;
                gap: 20px;
                align-items: stretch;
            }
            .search-wrapper {
                min-width: 100% !important;
            }
            .coupons-list {
                grid-template-columns: 1fr;
            }
        }
        .menu-toggle-admin {
            display: none;
        }
    </style>
    <script>
        window.toggleAdminSidebar = function() {
            const sidebar = document.querySelector(".admin-sidebar");
            sidebar.classList.toggle("active");
        };
    </script>
</head>
<body class="admin-page">

    <header class="navbar" style="left: 260px; width: calc(100% - 260px); height: 70px; display: flex; align-items: center; padding: 0 20px;">
      <div class="menu-toggle-admin" onclick="toggleAdminSidebar()">
        <i class="fa-solid fa-bars"></i>
      </div>
      <nav><ul class="nav-links"><li><a href="index.html">Back to Site</a></li></ul></nav>
      <div class="nav-right">
        <span id="admin-name" style="font-weight:600; color:var(--accent-color);"></span>
        <button id="theme-toggle" class="theme-btn"><i class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <div class="admin-layout">
        <aside class="admin-sidebar" style="position:fixed; top:0; left:0;">
            <div class="sidebar-brand">
              <a href="index.html" class="logo"><img src="images/logo.png" alt="logo"></a>
            </div>
            <a href="admin-dashboard.html" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i> <span class="nav-text">Overview</span>
            </a>
            <a href="admin-orders.html" class="nav-item">
                <i class="fa-solid fa-boxes-packing"></i> <span class="nav-text">All Orders</span>
            </a>
            <a href="admin-products.html" class="nav-item">
                <i class="fa-solid fa-couch"></i> <span class="nav-text">Manage Products</span>
            </a>
            <a href="admin-coupons.html" class="nav-item active">
                <i class="fa-solid fa-ticket"></i> <span class="nav-text">Manage Coupons</span>
            </a>
            <a href="admin-dashboard.html?tab=users" class="nav-item">
                <i class="fa-solid fa-users"></i> <span class="nav-text">Users</span>
            </a>
            <a href="admin-dashboard.html?tab=analytics" class="nav-item">
                <i class="fa-solid fa-chart-line"></i> <span class="nav-text">Analytics</span>
            </a>
            <a href="admin-dashboard.html?tab=reviews" class="nav-item">
                <i class="fa-solid fa-comments"></i> <span class="nav-text">Recent Reviews</span>
            </a>
            <div style="flex-grow: 1;"></div>
            <a href="#" class="nav-item" onclick="window.logout()">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> <span class="nav-text">Logout</span>
            </a>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <h1 class="welcome-text" style="font-family:'Playfair Display'; font-size:36px; margin:0;">Offer Management</h1>
                    <p style="color: var(--text-muted);">Manage discount codes and promotional offers instantly.</p>
                </div>
            </header>

            <div class="coupon-action-bar">
                <div style="display:flex; gap:15px; align-items:center;">
                    <button class="add-coupon-btn" id="openAddModal">
                        <i class="fa-solid fa-plus"></i> Create New Coupon
                    </button>
                    <button class="add-product-btn" style="background:var(--accent-light); color:var(--accent-color);" id="migrateBtn">
                        <i class="fa-solid fa-database"></i> Import Local Codes
                    </button>
                </div>
                <div class="search-wrapper" style="min-width:300px; position:relative;">
                    <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                    <input type="text" id="couponSearch" placeholder="Search codes..." style="width:100%; padding:12px 40px; border-radius:12px; border:1px solid var(--border-color); background:var(--card-bg); color:var(--text-primary);">
                </div>
            </div>

            <div id="admin-coupons-list" class="coupons-list">
                <!-- Dynamic Content -->
            </div>
        </main>
    </div>

    <!-- ADD MODAL -->
    <div class="modal" id="couponModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Coupon</h2>
                <i class="fa-solid fa-xmark" id="closeModal" style="cursor:pointer; font-size:20px;"></i>
            </div>
            
            <form id="couponForm">
                <div class="form-group">
                    <label>Coupon Code (All Caps)</label>
                    <input type="text" id="coup-code" placeholder="e.g. WELCOME500" required style="text-transform:uppercase;">
                </div>
                
                <div class="form-group">
                    <label>Discount Amount (₹)</label>
                    <input type="number" id="coup-value" placeholder="500" required>
                </div>

                <div class="form-group">
                    <label>Minimum Order Amount (₹)</label>
                    <input type="number" id="coup-min" placeholder="5000" value="0">
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" id="coup-expiry" required>
                </div>

                <div class="btn-row">
                    <button type="button" class="btn-cancel" id="cancelForm">Cancel</button>
                    <button type="submit" class="btn-save" id="saveCouponBtn">Activate Offer</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="admin-coupons.js"></script>
    <script src="theme.js"></script>
</body>
</html>
